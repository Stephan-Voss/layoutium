name: Code Checker

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Check project imports
      run: python -c "import main"

    - name: Install Ruff
      run: pip install ruff

    - name: Run Ruff
      run: ruff check .

